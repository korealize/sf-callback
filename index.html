<!DOCTYPE html>
<html>
<head><title>Sonic Field — Spotify Auth</title>
<style>
  body { background:#030508; color:#00ffe5; font-family:monospace;
         display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
  p { font-size:0.8rem; letter-spacing:0.15em; opacity:0.6; }
</style>
</head>
<body>
<p>AUTHORIZING... CLOSING WINDOW</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');

  if (window.opener) {
    // Send code back to the visualizer window via postMessage
    window.opener.postMessage(
      { type: 'sf_spotify_callback', code: code || null, error: error || null },
      '*'
    );
  }

  setTimeout(() => window.close(), 800);
</script>
</body>
</html>
